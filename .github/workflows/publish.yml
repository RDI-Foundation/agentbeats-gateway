name: Docker

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  CACHE_SCOPE: agentbeats-gateway

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Amber manifest image tag
        run: bash ./.github/workflows/check-manifest-image.sh amber-manifest.json5 version-series.txt

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/agentbeats-gateway" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tags
        id: release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: bash ./.github/workflows/resolve-release-version.sh version-series.txt "${{ steps.image.outputs.name }}" >> "${GITHUB_OUTPUT}"

      - name: Create and push release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          VERSION_TAG: ${{ steps.release.outputs.version_tag }}
        run: |
          set -euo pipefail

          managed_tag_marker='managed-by=agentbeats-gateway-ci'

          is_managed_tag() {
            local tag=$1
            local object_type

            object_type=$(git for-each-ref --format='%(objecttype)' "refs/tags/${tag}")
            [[ "${object_type}" == "tag" ]] || return 1
            git for-each-ref --format='%(contents)' "refs/tags/${tag}" | grep -Fxq "${managed_tag_marker}"
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if git rev-parse -q --verify "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            if ! is_managed_tag "${VERSION_TAG}"; then
              echo "release tag already exists but is not CI-managed: ${VERSION_TAG}" >&2
              exit 1
            fi

            if [[ "$(git rev-list -n 1 "refs/tags/${VERSION_TAG}")" != "${GITHUB_SHA}" ]]; then
              echo "release tag already exists on a different commit: ${VERSION_TAG}" >&2
              exit 1
            fi
          else
            git tag -a "${VERSION_TAG}" -m "Release ${VERSION_TAG}" -m "${managed_tag_marker}" "${GITHUB_SHA}"
          fi

          git push origin "refs/tags/${VERSION_TAG}:refs/tags/${VERSION_TAG}"

      - name: Prepare image tags
        id: tags
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          RELEASE_IMAGE_TAGS: ${{ steps.release.outputs.image_tags }}
        run: |
          set -euo pipefail

          {
            echo 'tags<<__TAGS__'
            if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${IMAGE_NAME}:latest"
              printf '%s\n' "${RELEASE_IMAGE_TAGS}"
            else
              echo "${IMAGE_NAME}:${GITHUB_SHA}"
            fi
            echo '__TAGS__'
          } >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          provenance: false
          sbom: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Update floating release tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          VERSION_TAG: ${{ steps.release.outputs.version_tag }}
          FLOATING_TAGS: ${{ steps.release.outputs.floating_tags }}
        run: |
          set -euo pipefail

          managed_tag_marker='managed-by=agentbeats-gateway-ci'

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          IFS=, read -r -a floating_tags <<< "${FLOATING_TAGS}"
          for tag in "${floating_tags[@]}"; do
            [[ -n "${tag}" ]] || continue
            git tag -fa "${tag}" -m "Release ${VERSION_TAG}" -m "${managed_tag_marker}" "${GITHUB_SHA}"
          done

          for tag in "${floating_tags[@]}"; do
            [[ -n "${tag}" ]] || continue
            git push origin "+refs/tags/${tag}:refs/tags/${tag}"
          done

      - name: Summarize published image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          FLOATING_TAGS: ${{ steps.release.outputs.floating_tags }}
        run: |
          echo "## Docker Image Published" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Version:** \`${{ steps.release.outputs.version_tag }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Floating tags:** \`${FLOATING_TAGS}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Git tags updated:** \`${{ steps.release.outputs.version_tag }}\`, \`${FLOATING_TAGS}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> "${GITHUB_STEP_SUMMARY}"
