name: Docker

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CACHE_SCOPE: agentbeats-gateway

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/agentbeats-gateway" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tags
        id: release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: bash ./.github/workflows/resolve-image-version.sh version-series.txt "${{ steps.image.outputs.name }}" >> "${GITHUB_OUTPUT}"

      - name: Prepare image tags
        id: tags
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          RELEASE_IMAGE_TAGS: ${{ steps.release.outputs.image_tags }}
        run: |
          set -euo pipefail

          {
            echo 'tags<<__TAGS__'
            if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${IMAGE_NAME}:latest"
              printf '%s\n' "${RELEASE_IMAGE_TAGS}"
            else
              echo "${IMAGE_NAME}:${GITHUB_SHA}"
            fi
            echo '__TAGS__'
          } >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          provenance: false
          sbom: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Summarize published image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          FLOATING_TAGS: ${{ steps.release.outputs.floating_tags }}
        run: |
          echo "## Docker Image Published" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Version:** \`${{ steps.release.outputs.version_tag }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Floating tags:** \`${FLOATING_TAGS}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> "${GITHUB_STEP_SUMMARY}"
